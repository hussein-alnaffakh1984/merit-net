# Netlify Configuration for MERIT-Net

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/model.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/json"
